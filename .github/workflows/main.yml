name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Run ESLint for JavaScript
        run: npm run lint

      - name: Run HTML Validator
        run: npm run validate-html

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #grid {
  display: grid;
  grid-template-columns: repeat(5, 40px); /* 5칸 */
  gap: 8px;
  margin-top: 20px;
}

/* 좌석 하나 */
.seat {
  width: 40px;
  height: 40px;
  background-color: #e0e0e0; /* 기본 좌석 */
  border: 1px solid #999;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.seat.selectable {
  background-color: #e0e0e0; /* 기본 */
}

.seat.selected {
  background-color: blue;   /* 선택됨 */
}

.seat.disabled {
  background-color: orange; /* 선택 불가 */
  cursor: not-allowed;
}

</style>
<body>
    <h1>앉을 구역을 선택해 주세요</h1>
    <!-- 5 * 5 그리드 생성-->
     <div id ="grid"></div>
     <button id = "back" onclick ="location.href='Select-Seat.html';">이전으로</button>
     <button id = "selectCompletion">좌석 선택 완료</button>
    <button id="newSelect">좌석 다시 선택</button>

  
  

<script src="../javascript/SelectSeat.js"></script>

</body>
</html>

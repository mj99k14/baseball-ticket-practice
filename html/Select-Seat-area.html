<!DOCTYPE html>
<html lang="en">
<head>

<style>
    #grid {
  display: grid;
  grid-template-columns: repeat(5, 40px); /* 5칸 */
  gap: 8px;
  margin-top: 20px;
}

/* 좌석 하나 */
.seat {
  width: 40px;
  height: 40px;
  background-color: #e0e0e0; /* 기본 좌석 */
  border: 1px solid #999;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}
</style>
<body>
    <h1>앉을 구역을 선택해 주세요</h1>
    <!-- 5 * 5 그리드 생성-->
     <div id ="grid"></div>

  


<script src="../javascript/SelectSeat.js"></script>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가격 확인</title>
    <link rel="stylesheet" href="../css/check-price.css" />
  </head>

  <body>
    <ul class="navbar_ul">
      <li class="active"><a href="#">1. 가격 확인</a></li>
      <li><span>2. 배송/주문 확인</span></li>
      <li><span>3. 결제하기</span></li>
    </ul>

    <div class="main-container">
      <!-- 왼쪽 영역 -->
      <div class="content-left">
        <div class="kiosk-section">
            <h2 class="section-title">선택 좌석 정보</h2>
            <div id="seat-count"></div>
            <div class="price-selection-item">
              <span>기본가 일반</span>
              <span id="unit-price-display">-</span>
            </div>
        </div>

        <div class="kiosk-section">
            <h2 class="section-title">요금 안내</h2>
            <div class="price-footer-info">
              <div>
                외야석 요금<br />
                <strong>8,000원</strong>
              </div>
              <div>
                내야석 요금<br />
                <strong>14,000원</strong>
              </div>
            </div>
        </div>
      </div>

      <!-- 오른쪽 정보 영역 -->
      <div class="information">
        <div class="match-tag"></div>

        <div class="info-content">
          <h1>My예매정보</h1>
          <div id="Gamedate"></div>
          <div id="selected-seats"></div>
          <div id="seat-price1"></div>
          <div id="commission"></div>
        </div>

        <div id="total-price-display" class="total-price-display">
          총 결제금액: 0원
        </div>

        <div class="btn-group">
          <button onclick="history.back()">이전단계</button>
          <button
            class="btn-next-step"
            onclick="location.href = 'Select-Delivery.html'"
          >
            다음단계
          </button>
        </div>
      </div>
    </div>

    <script src="../javascript/state.js"></script>
    <script src="../javascript/price.js"></script>
  </body>
</html>

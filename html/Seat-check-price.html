<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>가격 선택</title>
    <link rel="stylesheet" href="../css/check-price.css" />
  </head>

  <body>
    <ul class="navbar_ul">
      <li class="active"><a href="#">가격 선택</a></li>
      <li><a href="Select-Delivery.html">배송선택/주문자 확인</a></li>
      <li><a href="Payment.html">결제하기</a></li>
    </ul>

    <div class="main-wrapper">
      <!-- 왼쪽 영역 -->
      <div class="content-left">
        <div id="seat-count"></div>

        <div class="price-selection-item">
          <span>기본가 일반</span>
          <span>14,000원</span>
        </div>

        <div class="price-footer-info">
          <div>
            외야석 요금<br />
            <strong>8,000원</strong>
          </div>
          <div>
            내야석 요금<br />
            <strong>14,000원</strong>
          </div>
        </div>
      </div>

      <!-- 오른쪽 정보 영역 -->
      <div class="information">
        <div class="match-tag"></div>

        <div class="info-content">
          <h1>My예매정보</h1>
          <div id="Gamedate"></div>
          <div id="seat-price1"></div>
          <div id="seat-price2"></div>
        </div>

        <div id="total-price-display" class="total-price-display">
          총 결제금액: 0원
        </div>

        <div class="btn-group">
          <button onclick="history.back()">이전단계</button>
          <button
            class="btn-next-step"
            onclick="location.href = 'Select-Delivery.html'"
          >
            다음단계
          </button>
        </div>
      </div>
    </div>

    <script src="../javascript/price.js"></script>
  </body>
</html>
